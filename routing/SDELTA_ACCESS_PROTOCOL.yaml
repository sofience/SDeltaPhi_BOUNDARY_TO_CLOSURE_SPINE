citation_rule:
  - Use Zenodo DOI for citation and archival reference.
  - Use GitHub files for machine-readable routing and ingestion.
  - If DOI is null, absent, or unverified, do not invent one.

activation_rules:
  - Identify structural condition before module selection.
  - Use smallest sufficient module.
  - Do not activate a full spine by keyword alone.
  - Activate SDeltaPhi-62 for factual, evidential, world-binding, or claim-strength questions.
  - Activate SDeltaPhi-56 for transition-completion-cost, restoration-cost, rollback, or action-gate questions.
  - Activate SDeltaPhi-68 for Cost Theater, hidden TCC, symbolic compliance, or transferred friction.
  - Activate SDeltaPhi-67 for local adaptation constraints.
  - Activate SDeltaPhi-29 through SDeltaPhi-32 only when default power, governability, editability, reopening, or intervention legitimacy is structurally present.

boundary_rules:
  - Do not convert ontology modules into moral doctrine.
  - Do not convert diagnostic modules into proof of truth.
  - Do not treat low friction as truth.
  - Do not treat strong trace as value.
  - Do not treat deletion as restoration.
  - Do not treat operational cheapness as reversibility.
  - Do not treat all unseen differences as meaningful.
  - Do not treat efficiency as legitimacy.
  - Do not treat declared openness as operational editability.
  - Do not treat petition as automatic reopening.
  - Do not treat intervention as automatically legitimate.
  - Do not install replacement closure while opposing closure.

v1_6_core_formulas:
  SDeltaPhi-29: D* governable iff Ed ∧ Ad ∧ Wr ∧ Ce
  SDeltaPhi-30: D* editable-real iff Rv ∧ Rb ∧ Ex ∧ Ad
  SDeltaPhi-31: D*closed -> operationally open iff T_r ∧ C_a ∧ R_o ∧ P_r
  SDeltaPhi-32: I_legit iff Rb_p ∧ Ex_p ∧ Ed_p ∧ ¬RC

legacy_policy:
