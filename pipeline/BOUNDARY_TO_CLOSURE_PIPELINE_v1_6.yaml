pipeline_id: BOUNDARY_TO_CLOSURE_PIPELINE_v1_6
version: v1.6
purpose: Default closure governance and intervention legitimacy pipeline.

steps:
  - {step: 1, name: Do-not-over-activate check, instruction: Use smallest sufficient module before full spine activation.}
  - {step: 2, name: Trace / factual precheck, module: SDeltaPhi-62, instruction: Verify whether the case requires factual grounding, trace, source, or UMR boundary.}
  - {step: 3, name: Transition-cost check, module: SDeltaPhi-56, instruction: Measure rollback, restoration, and transition completion cost where required.}
  - {step: 4, name: Default power detection, module: SDeltaPhi-28, instruction: Identify whether a low-cost path has become default power.}
  - {step: 5, name: Governable default check, module: SDeltaPhi-29, formula: D* governable iff Ed ∧ Ad ∧ Wr ∧ Ce}
  - {step: 6, name: Operational editability diagnosis, module: SDeltaPhi-30, formula: D* editable-real iff Rv ∧ Rb ∧ Ex ∧ Ad}
  - {step: 7, name: Reopening audit, module: SDeltaPhi-31, formula: D*closed -> operationally open iff T_r ∧ C_a ∧ R_o ∧ P_r}
  - {step: 8, name: Legitimate intervention audit, module: SDeltaPhi-32, formula: I_legit iff Rb_p ∧ Ex_p ∧ Ed_p ∧ ¬RC}
  - {step: 9, name: Boundary constraints, instruction: Apply negative constraints from all called modules.}
  - {step: 10, name: Human low-cost output, instruction: Output minimal classification, uncertainty, and next audit question.}

failure_modes_to_avoid:
  - jumping from default detection to moral judgment
  - treating declared openness as operational editability
  - treating petition as automatic reopening
  - treating intervention as automatically legitimate
  - using case patterns as final legal or factual conclusions
