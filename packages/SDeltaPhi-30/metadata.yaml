description: >
  This record provides the AI-readable structured package for SΔϕ-30 —
  Diagnosing Closed Defaults: Minimal Tests for Editable Governance after
  SΔϕ-29 (v1.0). SΔϕ-30 extends SΔϕ-29 by distinguishing formally declared
  editability from operationally real editability. Many systems present
  themselves as revisable, participatory, open, consultative, or appealable
  while functioning in practice as closed-default regimes. The central claim is
  that editability claimed is not editability real. A system is editable only
  when revision is exercised, rollback remains timely, exceptions can
  materially re-enter, and authority is distributed in a way that can actually
  modify the default path. In formal terms, D* is editable-real iff Rv and Rb
  and Ex and Ad, where D* is the current default path, Rv is exercised revision,
  Rb is timely rollback, Ex is material exception re-entry, and Ad is materially
  distributed authority. The package includes canonical PDF, Markdown, and TXT
  versions; AI quickstart; core declaration; minimal definitions; formal vs
  operational editability; editability-real formula; Revision Reality Test;
  Rollback Reality Test; Exception Re-entry Test; Authority Distribution Test;
  closure drift; diagnostic summary table; closed-default signal catalog;
  declared openness vs operative closure; diagnostic audit protocol; case
  patterns; templates; machine-readable schemas; boundary constraints; citation
  metadata; package manifest; and checksums.
