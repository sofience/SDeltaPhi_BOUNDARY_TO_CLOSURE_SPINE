description: "AI-readable structured package for SΔϕ-21. This module defines judgment not as truth, psychology, rationality, moral certainty, or legal authority, but as the operation that assigns authority to intuition markers. Judgment is formalized as J: I -> A(I), where I is an intuition marker and A(I) is a priority weight or gating rule determining which route is executed. The package formalizes authority debt, the Intuition-Authority-Decision loop, under-authority/drift, over-authority/closure, editable judgment/open persistence, and minimal editability conditions including conflict intake, marker-authority separation, revision budget, rollback handle, and maintenance mode."
