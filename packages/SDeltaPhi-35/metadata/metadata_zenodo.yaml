title: 'SΔϕ-35 — Minimal Closure Criteria for AGI: A Δϕ-Based Judgment Framework (v1.2,
  AI-Readable Package)'
upload_type: publication
publication_type: workingpaper
creators:
- name: Sofience
description: 'SDeltaPhi-35 reformulates Artificial General Intelligence as a closure
  judgment problem rather than a human-equivalence label, benchmark aggregation, or
  impressionistic capability claim. It decomposes AGI evaluation into five minimal
  operational closure criteria: global generality, long-horizon recursive agency,
  world-model correspondence, self-updating robustness, and creative path generation.'
