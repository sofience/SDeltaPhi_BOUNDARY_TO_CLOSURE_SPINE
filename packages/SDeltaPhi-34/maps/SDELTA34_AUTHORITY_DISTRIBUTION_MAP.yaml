authority_distribution:
  core_claim: Capital does not merely widen choice; it reorganizes who may define
    the field in which choice occurs.
  mechanisms:
  - platform ownership
  - infrastructure control
  - financial pipelines
  - legal capacity
  - communication channels
  - organizational systems
  - standard-setting institutions
  diagnostic_question: Who can edit defaults, widen rollback windows, close them,
    preserve exception channels, or price them out of existence?
