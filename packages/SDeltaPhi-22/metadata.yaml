description: "AI-readable structured package for SΔϕ-22. This module operationalizes SΔϕ-21 by specifying the Authority Editing Protocol (AEP): the re-entry governance loop that keeps authority revisable at finite cost. Its core thesis is that open persistence is not a belief in openness but the maintenance of authority editability under finite cost. The package defines trigger necessity, update budget, rollback handle, marker-authority separation, maintenance, the seven-step AEP, diagnostic regimes of drift/closure/open persistence, and co-environmentalization notes."
