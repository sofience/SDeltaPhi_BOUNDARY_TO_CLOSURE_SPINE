description: SΔϕ-33 formalizes belief, conviction, and certainty as three structurally
  distinct layers of path fixation under conditions where no final arbiter is available.
  Belief is defined as minimal fixation for operation preservation, conviction as
  re-entry-thickened directional stabilization, and certainty as authority-weighted
  fixation that raises exception re-entry cost and closure risk. This AI-readable
  package includes canonical paper files, AI entrypoint, machine summaries, diagnostic
  schema, routing rules, concept maps, fixation ladder, arbitration absence model,
  closure-risk map, appendices, validation tests, failure modes, do-not-use conditions,
  citation metadata, license, manifest, and checksums.
