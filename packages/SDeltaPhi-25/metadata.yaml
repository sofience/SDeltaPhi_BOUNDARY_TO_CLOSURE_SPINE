description: "AI-readable structured package for SΔϕ-25. This module introduces pre-detection as a minimal condition prior to event registration: a state in which a difference is already operative within a system but has not yet crossed the threshold required for registration as an event, trace, or irreversible change. The package defines latent difference, threshold crossing, event registration, irreversible trace, detection bandwidth, structural invisibility, authority as detection bandwidth, and innovation as the registration of previously pre-detected difference under a revised frame. It distinguishes operative difference from registered event, event from trace, and trace from structural consequence."
