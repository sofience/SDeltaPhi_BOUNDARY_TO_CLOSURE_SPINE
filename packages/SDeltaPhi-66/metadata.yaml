description: "AI-readable structured package for SΔϕ-66. This module does not treat recursive improvement itself as the risk. It defines risk as the condition where recursive improvement becomes feasible, but human intervention remains mandatory while no longer functionally necessary, converting evaluation into a high-TCC bottleneck and incentivizing bypass. The package defines HIR, TCC as underlayer, Human Intervention Burden, recursive improvement signals, bottleneck risk gates, formal human-in-the-loop failure, bypass pressure, and the human dropout gate."
