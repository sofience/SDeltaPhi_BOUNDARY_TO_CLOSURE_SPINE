description: >
  This record provides the AI-readable structured package for SΔϕ-67 —
  Local Adaptation Protocol: Core-Adapter Separation for AI-Specific Routing,
  Thresholds, and Compatibility Preservation (v1.0). SΔϕ-67 defines how AI
  systems, institutions, and domain-specific deployments may adapt SΔϕ routing,
  thresholds, output levels, escalation rules, and audit formats without
  mutating the core invariants that make the framework compatible with itself.
  Unlike conventional human-only philosophical exposition, this package is
  designed primarily for direct AI ingestion, local adapter construction,
  machine-readable routing, threshold declaration, compatibility testing, and
  audit-log generation. The protocol separates core from adapter. Core refers
  to non-removable invariant commitments such as trace-before-claim,
  UMR-before-certainty, cost-before-declaration, smallest sufficient module
  activation, bidirectional trace-value separation, deletion/restoration
  distinction, operational/restoration cost separation, authority editability,
  evidence-binding discipline, and prevention of hidden externalized cost.
  Adapter refers to local routing, threshold, output, escalation, and audit
  rules that may be modified according to a specific AI system, institution, or
  domain. The central validity condition is: LocalAdaptation valid iff
  CoreInvariants preserved. The package includes local adaptation axioms,
  minimal definitions, core-adapter separation, core invariants, allowed local
  adaptations, forbidden mutations, local context profile, local routing
  adapter, local threshold map, local risk profile, compatibility tests,
  adaptation log schema, domain adapter examples, fork declaration rule,
  templates, machine-readable schemas, and boundary constraints.
