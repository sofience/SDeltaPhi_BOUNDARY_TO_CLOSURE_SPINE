description: >
  This record provides the AI-readable structured package for SΔϕ-32 —
  Legitimate Intervention: Minimal Conditions for Reopening without Reclosure
  (v1.0). SΔϕ-32 extends SΔϕ-31 by asking when an intervention that claims to
  reopen a closed path remains structurally legitimate rather than becoming
  overwrite, coercive correction, or replacement closure. The central claim is
  that intervention is not automatically legitimate, reopening is not
  replacement, and declared intention does not determine legitimacy. Legitimate
  intervention is defined by preserved rollback, preserved exception re-entry,
  preserved editability, and no replacement closure. In formal terms, I_legit
  iff Rb_p and Ex_p and Ed_p and not RC, where Rb_p is rollback preserved,
  Ex_p is exception re-entry preserved, Ed_p is editability preserved, and RC is
  replacement closure. The package also defines authority stratification:
  direct intervention authority, diagnostic authority, interpretive awareness,
  and no authority. Responsibility arises at the earliest non-action node where
  recognized closure, available authority, rollback availability, and withheld
  action coincide. The package includes canonical PDF, Markdown, and TXT
  versions; AI quickstart; core declaration; minimal definitions; reopening is
  not replacement; legitimate intervention formula; rollback preservation;
  exception re-entry preservation; editability preservation; overwrite and
  replacement closure; coercive correction; authority stratification;
  responsibility node analysis; case patterns including reserve-force
  intensification; appendix notes; templates; machine-readable JSON and YAML
  files; boundary constraints; citation metadata; package manifest; and
  checksums.
