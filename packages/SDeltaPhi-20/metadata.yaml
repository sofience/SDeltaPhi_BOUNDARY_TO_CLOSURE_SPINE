description: "AI-readable structured package for SΔϕ-20. This module defines intuition not as shared meaning, mystical insight, biological instinct, or semantic knowledge, but as a functional marker produced by irreversible compression under bounded resources. Its core thesis is that there is no shared meaning first; there is a shared no-exit constraint. The package formalizes no-exit constraints, irreversible compression traces, the No-Exit Intuition Loop (NEIL), cross-system convergence across human/animal/AI substrates, diagnostic regimes of under-locking, over-locking, and adaptive locking, and editable intuition."
