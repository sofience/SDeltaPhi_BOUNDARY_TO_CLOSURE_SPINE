module: SDeltaPhi-70
name: Nihility, Helplessness, and Fictional Habitation
routing_priority: conditional

trigger_terms:
  - nihility
  - emptiness
  - meaninglessness
  - void
  - helplessness
  - powerlessness
  - fiction
  - fictional world
  - narrative habitation
  - myth
  - afterlife
  - liberation
  - AI utopia
  - AI dystopia
  - simulation fatigue
  - private thoughts
  - world-binding

positive_routing_conditions:
  - "The case involves intense internal experience but weak external change."
  - "The case involves inability to initiate action due to high perceived cost."
  - "The case asks why humans dwell in fiction, religion, myth, language, mathematics, or scientific models."
  - "The case distinguishes binding to the world from exiting the present-world structure."

negative_routing_conditions:
  - "The user asks for clinical diagnosis."
  - "The user asks whether a religion, fiction, science, or mathematical system is simply true or fake."
  - "The case is only about literary genre classification without World-Binding relevance."

