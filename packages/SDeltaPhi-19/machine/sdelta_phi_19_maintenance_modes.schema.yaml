  sleep:
    formula: "Sleep := Maintenance(DeltaPhi) by reorganizing traces and reducing drift"
    functions:
      - "trace reorganization"
      - "drift reduction"
      - "future persistence cost reduction"
      - "closure attractor lock-in prevention"

  mode_switch:
    formula: "Switch_to_Sleep iff d(Cost_coherence)/dt > d(Cost_maintenance)/dt"

